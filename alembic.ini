# ===========================================================
# alembic.ini — SBT (BusTrack) Migration Configuration
# -----------------------------------------------------------
# Controls how Alembic connects to the database and logs migrations
# ===========================================================

[alembic]
# Path to migration scripts folder (auto-created by Alembic)
script_location = alembic

# Default template for migration file names
file_template = %%(rev)s_%%(slug)s

# Timestamp format for log entries


# Revisions are relative to this base branch (usually "base")
version_locations = alembic/versions

# Environment file used by Alembic (loads SQLAlchemy Base metadata)
prepend_sys_path = .

# ===========================================================
# Database connection string
# -----------------------------------------------------------
# Normally read from .env via backend/database.py,
# but you can override it manually here if needed.
# ===========================================================
sqlalchemy.url = sqlite:///sbt.db

# ===========================================================
# Logging configuration
# ===========================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S
